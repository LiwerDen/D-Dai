<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Wardrobe</title>
    
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050231.png">

    <!-- Styles & Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root { --bg: #ffffff; --text: #000000;}
        .dark { --bg: #000000; --text: #ffffff; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body.dark { color: #ffffff; }
        body:not(.dark) { color: #000000; }
        .text-adaptive { color: inherit; }

        .glass {
            background: rgba(120, 120, 120, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 120, 120, 0.1);
        }

        header { padding-top: env(safe-area-inset-top, 1.2rem) !important; height: 6rem; display: flex; align-items: center; }
        main { padding-top: 7.5rem !important; }

        .page { display: none; animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: var(--accent); transform: scale(1.1); }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
        .canvas-container { margin: 0 auto !important; border-radius: 30px; overflow: hidden; background: #151515 !important; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .custom-swal-popup { border-radius: 35px !important; background: #111 !important; border: 1px solid #333 !important; color: white !important; }
        .custom-swal-input { 
            background: #1a1a1a !important; border: 1px solid #333 !important; 
            border-radius: 15px !important; color: white !important; font-family: inherit; margin-bottom: 10px !important;
        }

        .hourly-item { min-width: 60px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    </style>
</head>
<body class="dark">

    <div id="main-interface">
        <header class="fixed top-0 left-0 right-0 z-40 px-8 glass">
            <div class="max-w-2xl mx-auto w-full flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tighter italic text-indigo-500">WARDROBE AI</h1>
                <div class="flex gap-5">
                    <button onclick="toggleTheme()"><i data-lucide="sun-moon" class="w-6 h-6"></i></button>
                    <button onclick="showPage('profile')"><i data-lucide="user" class="w-6 h-6"></i></button>
                </div>
            </div>
        </header>

        <main class="pb-32 px-8 max-w-2xl mx-auto">
            <!-- HOME PAGE -->
            <section id="view-home" class="page active">
                <div class="glass rounded-[40px] p-8 mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p id="weather-city" class="text-[11px] uppercase tracking-[0.2em] text-gray-500">Загрузка...</p>
                            <h2 id="weather-temp" class="text-6xl font-light tracking-tighter mt-1 text-adaptive">--°</h2>
                            <p id="weather-desc" class="text-sm mt-2 font-medium capitalize text-indigo-400">---</p>
                        </div>
                        <div class="text-right">
                            <p id="weather-hum" class="text-[10px] uppercase text-gray-500">Влажность: --%</p>
                            <p id="weather-day" class="text-[10px] uppercase text-gray-500 mt-1">Сегодня: -- / --</p>
                        </div>
                    </div>
                    <!-- Hourly Forecast -->
                    <div id="weather-hourly" class="flex gap-4 overflow-x-auto no-scrollbar border-t border-white/10 pt-4 mt-2">
                        <!-- Почасовая погода попадет сюда -->
                    </div>
                </div>

                <div class="glass rounded-[40px] p-8 mb-8">
                    <h3 class="text-xs font-bold flex items-center gap-2 mb-4 tracking-widest uppercase text-indigo-400">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>AI Совет
                    </h3>
                    <p id="ai-daily-advice" class="text-xl font-light leading-relaxed italic text-adaptive">"Загружаем вдохновение..."</p>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <button onclick="triggerUpload()" class="h-44 glass rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition">
                        <i data-lucide="plus-circle" class="w-9 h-9 text-indigo-500"></i>
                        <span class="text-xs font-bold uppercase tracking-wider text-adaptive">Загрузить</span>
                    </button>
                    <button onclick="showPage('closet')" class="h-44 glass rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition">
                        <i data-lucide="shirt" class="w-9 h-9 text-indigo-500"></i>
                        <span class="text-xs font-bold uppercase tracking-wider text-adaptive">Гардероб</span>
                    </button>
                </div>
            </section>

            <!-- CLOSET PAGE -->
            <section id="view-closet" class="page">
                <h2 class="text-4xl font-bold mb-6 tracking-tight text-adaptive">Вещи</h2>
                <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6" id="closet-filters">
                    <!-- Категории фильтрации -->
                </div>
                <div id="closet-grid" class="grid grid-cols-2 gap-5"></div>
            </section>

            <!-- EDITOR PAGE -->
            <section id="view-editor" class="page">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold tracking-tight text-adaptive">Конструктор</h2>
                    <button onclick="geminiGenerateOutfit()" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase flex items-center gap-2 active:scale-90 transition shadow-lg shadow-indigo-500/20">
                        <i data-lucide="sparkles" class="w-3 h-3"></i> AI Генерация
                    </button>
                </div>
                <div class="flex justify-center mb-6"><canvas id="outfit-canvas"></canvas></div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4" id="editor-filters">
                    <!-- Категории конструктора -->
                </div>
                <div id="editor-inventory" class="flex gap-4 overflow-x-auto no-scrollbar glass p-6 rounded-[35px] min-h-[120px]"></div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="canvas.clear()" class="bg-white/5 py-5 rounded-[25px] font-bold text-[10px] uppercase tracking-widest active:scale-95 transition text-adaptive">Очистить</button>
                    <button onclick="saveOutfit()" class="bg-indigo-500 text-white py-5 rounded-[25px] font-bold text-[10px] uppercase tracking-widest active:scale-95 transition shadow-lg">Сохранить</button>
                </div>
            </section>

            <!-- PROFILE PAGE -->
            <section id="view-profile" class="page">
                <div class="flex flex-col items-center gap-4 mb-10">
                    <div onclick="triggerAvatarUpload()" class="relative w-32 h-32 rounded-full overflow-hidden border-4 border-indigo-500 cursor-pointer group shadow-2xl">
                        <img id="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i data-lucide="camera" class="text-white w-6 h-6"></i>
                        </div>
                    </div>
                    <div class="text-center w-full">
                        <input type="text" id="user-name" class="bg-transparent border-none outline-none text-2xl font-bold text-center w-full text-adaptive" oninput="saveUserData()" placeholder="Ваше имя">
                        <textarea id="user-bio" class="bg-transparent border-none outline-none text-sm text-gray-500 text-center w-full mt-2 resize-none" oninput="saveUserData()" placeholder="О себе..."></textarea>
                    </div>
                </div>
                <h2 class="text-xl font-bold mb-6 tracking-tight flex items-center gap-2 text-adaptive"><i data-lucide="heart" class="text-red-500 w-5 h-5"></i> Мои Образы</h2>
                <div id="outfits-grid" class="grid grid-cols-2 gap-5 mb-10"></div>
                <button onclick="resetOutfitsOnly()" class="w-full py-5 text-red-500 text-[11px] font-black uppercase tracking-[0.2em] border border-red-500/10 rounded-2xl active:bg-red-500/5 transition">Сбросить образы</button>
            </section>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-20 glass rounded-[40px] flex items-center justify-around px-8 z-50 tab-bar">
            <button onclick="showPage('home')" class="nav-btn" id="btn-home"><i data-lucide="home"></i></button>
            <button onclick="showPage('closet')" class="nav-btn" id="btn-closet"><i data-lucide="shirt"></i></button>
            <button onclick="showPage('editor')" class="nav-btn" id="btn-editor"><i data-lucide="combine"></i></button>
            <button onclick="showPage('profile')" class="nav-btn" id="btn-profile"><i data-lucide="layout-grid"></i></button>
        </nav>
    </div>

    <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
    <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">

    <script>
        const GEMINI_KEY = 'AIzaSyDFJ9AkIpDm7A2I8UAYK5lsjJWXVKaAGqI'; 
        const WEATHER_KEY = 'd73f839eb883d8a9f75cf9433fb4713e';
        
        const CATEGORIES = [
            "Футболки", "Топы", "Кофты", "Куртки", 
            "Брюки", "Штаны", "Юбки", "Шорты", 
            "Обувь", "Шапки", "Аксессуары"
        ];

        let db, canvas, allItems = [], currentClosetCat = "Все", currentEditorCat = "Все";

        window.onload = async () => {
            initDB();
            initCanvas();
            initWeather();
            initAIService();
            loadUserData();
            initTheme();
            renderCategoryFilters();
            showPage('home');
            lucide.createIcons();
        };

        function initDB() {
            const request = indexedDB.open('WardrobeGeminiDB', 2);
            request.onupgradeneeded = (e) => {
                const dbInstance = e.target.result;
                if (!dbInstance.objectStoreNames.contains('items')) dbInstance.createObjectStore('items', { keyPath: 'id' });
                if (!dbInstance.objectStoreNames.contains('outfits')) dbInstance.createObjectStore('outfits', { keyPath: 'id' });
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                refreshData();
            };
        }

        function refreshData() {
            db.transaction('items', 'readonly').objectStore('items').getAll().onsuccess = (e) => {
                allItems = e.target.result;
                renderCloset();
                filterEditorInventory(currentEditorCat);
            };
            renderSavedOutfits();
        }

        function initCanvas() {
            const size = Math.min(window.innerWidth - 64, 400);
            canvas = new fabric.Canvas('outfit-canvas', { 
                width: size, height: size * 1.2, backgroundColor: '#151515'
            });
        }

        function renderCategoryFilters() {
            const createBtn = (cat, active, onClick) => `
                <button onclick="${onClick}('${cat}')" class="cat-btn ${active ? 'bg-indigo-500/20 active' : 'glass'} px-4 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap text-adaptive">
                    ${cat}
                </button>`;

            const html = ['Все', ...CATEGORIES].map(cat => createBtn(cat, cat === "Все", "filterCloset")).join('');
            const htmlEditor = ['Все', ...CATEGORIES].map(cat => createBtn(cat, cat === "Все", "filterEditorInventory")).join('');
            
            document.getElementById('closet-filters').innerHTML = html;
            document.getElementById('editor-filters').innerHTML = htmlEditor;
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const { value: v } = await Swal.fire({
                title: 'НОВАЯ ВЕЩЬ',
                background: '#111', color: '#fff',
                customClass: { popup: 'custom-swal-popup' },
                html: `
                    <input id="swal-name" class="custom-swal-input w-full p-4" placeholder="Название">
                    <input id="swal-brand" class="custom-swal-input w-full p-4" placeholder="Бренд">
                    <select id="swal-cat" class="custom-swal-input w-full p-4">
                        ${CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}
                    </select>`,
                preConfirm: () => ({ 
                    name: document.getElementById('swal-name').value, 
                    brand: document.getElementById('swal-brand').value,
                    category: document.getElementById('swal-cat').value 
                })
            });
            if (!v) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                db.transaction('items', 'readwrite').objectStore('items').add({ id: Date.now(), img: reader.result, ...v });
                setTimeout(refreshData, 100);
            };
        }

        function filterCloset(cat) {
            currentClosetCat = cat;
            renderCloset();
            updateFilterUI('closet-filters', cat);
        }

        function renderCloset() {
            const filtered = currentClosetCat === "Все" ? allItems : allItems.filter(i => i.category === currentClosetCat);
            document.getElementById('closet-grid').innerHTML = filtered.map(i => `
                <div class="glass p-4 rounded-[30px] relative group">
                    <img src="${i.img}" class="w-full aspect-square object-contain mb-2 rounded-xl">
                    <p class="text-[9px] font-bold uppercase text-indigo-400">${i.category} ${i.brand ? '• ' + i.brand : ''}</p>
                    <p class="text-xs font-bold truncate text-adaptive">${i.name}</p>
                    <button onclick="deleteItem(${i.id}, 'items')" class="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`).join('');
            lucide.createIcons();
        }

        function filterEditorInventory(cat) {
            currentEditorCat = cat;
            const filtered = cat === 'Все' ? allItems : allItems.filter(i => i.category === cat);
            document.getElementById('editor-inventory').innerHTML = filtered.map(i => `
                <div onclick="addToCanvas('${i.img}')" class="flex-shrink-0 cursor-pointer active:scale-90 transition">
                    <img src="${i.img}" class="w-20 h-20 glass p-2 rounded-2xl object-contain">
                </div>`).join('');
            updateFilterUI('editor-filters', cat);
        }

        function updateFilterUI(parentId, activeCat) {
            const btns = document.getElementById(parentId).querySelectorAll('button');
            btns.forEach(b => {
                if(b.innerText === activeCat.toUpperCase()) {
                    b.classList.add('bg-indigo-500/20', 'active');
                    b.classList.remove('glass');
                } else {
                    b.classList.remove('bg-indigo-500/20', 'active');
                    b.classList.add('glass');
                }
            });
        }

        function addToCanvas(url) {
            fabric.Image.fromURL(url, (img) => {
                img.scaleToWidth(140);
                canvas.add(img);
                canvas.centerObject(img);
                canvas.setActiveObject(img);
            });
        }

        async function geminiGenerateOutfit() {
            if (allItems.length < 2) return Swal.fire('Мало вещей для образа!');
            
            Swal.fire({ 
                title: 'AI собирает образ...', 
                background: '#111', color: '#fff', 
                didOpen: () => Swal.showLoading(),
                customClass: { popup: 'custom-swal-popup' }
            });

            const itemsStr = allItems.map(i => `ID:${i.id} (категория:${i.category}, имя:${i.name})`).join(', ');
            const prompt = `Ты стилист. Выбери из списка 3 гармонирующих вещи (например верх, низ и обувь). Список: ${itemsStr}. Верни ТОЛЬКО ID через запятую.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const ids = data.candidates[0].content.parts[0].text.split(',').map(id => parseInt(id.trim())).filter(n => !isNaN(n));
                
                canvas.clear();
                ids.forEach((id, idx) => {
                    const item = allItems.find(i => i.id === id);
                    if (item) {
                        fabric.Image.fromURL(item.img, (img) => {
                            img.scaleToWidth(150);
                            img.set({ top: 50 * idx, left: 30 * idx });
                            canvas.add(img);
                            canvas.renderAll();
                        });
                    }
                });
                Swal.close();
            } catch (e) { Swal.fire('Ошибка ИИ'); }
        }

        function initAIService() {
            const tips = ["Многослойность — тренд сезона", "Добавь аксессуар для акцента", "Минимализм всегда актуален"];
            document.getElementById('ai-daily-advice').innerText = tips[Math.floor(Math.random() * tips.length)];
        }

        async function initWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    // Current Weather
                    const curRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${WEATHER_KEY}`);
                    const curData = await curRes.json();
                    
                    document.getElementById('weather-city').innerText = curData.name;
                    document.getElementById('weather-temp').innerText = Math.round(curData.main.temp) + '°';
                    document.getElementById('weather-desc').innerText = curData.weather[0].description;
                    document.getElementById('weather-hum').innerText = `Влажность: ${curData.main.humidity}%`;
                    document.getElementById('weather-day').innerText = `Сегодня: ${Math.round(curData.main.temp_max)}° / ${Math.round(curData.main.temp_min)}°`;

                    // Hourly Forecast
                    const hourRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${WEATHER_KEY}`);
                    const hourData = await hourRes.json();
                    
                    const hourlyHtml = hourData.list.slice(0, 8).map(h => {
                        const time = new Date(h.dt * 1000).getHours() + ":00";
                        const icon = `https://openweathermap.org/img/wn/${h.weather[0].icon}.png`;
                        return `
                            <div class="hourly-item">
                                <span class="text-[9px] text-gray-400 uppercase">${time}</span>
                                <img src="${icon}" class="w-8 h-8">
                                <span class="text-xs font-bold text-adaptive">${Math.round(h.main.temp)}°</span>
                            </div>`;
                    }).join('');
                    document.getElementById('weather-hourly').innerHTML = hourlyHtml;

                } catch(e) { console.error("Weather error", e); }
            });
        }

        function saveOutfit() {
            const data = canvas.toDataURL();
            db.transaction('outfits', 'readwrite').objectStore('outfits').add({ id: Date.now(), img: data });
            setTimeout(refreshData, 100);
            showPage('profile');
        }

        function renderSavedOutfits() {
            db.transaction('outfits', 'readonly').objectStore('outfits').getAll().onsuccess = (e) => {
                document.getElementById('outfits-grid').innerHTML = e.target.result.map(o => `
                    <div class="glass p-2 rounded-[25px] relative group">
                        <img src="${o.img}" class="w-full rounded-[20px]">
                        <button onclick="deleteItem(${o.id}, 'outfits')" class="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`).join('');
                lucide.createIcons();
            };
        }

        function loadUserData() {
            document.getElementById('user-name').value = localStorage.getItem('user_name') || 'Ваш Стиль';
            document.getElementById('user-bio').value = localStorage.getItem('user_bio') || 'Опишите свой вкус';
            if (localStorage.getItem('user_avatar')) document.getElementById('profile-avatar').src = localStorage.getItem('user_avatar');
        }

        function saveUserData() {
            localStorage.setItem('user_name', document.getElementById('user-name').value);
            localStorage.setItem('user_bio', document.getElementById('user-bio').value);
        }

        function triggerAvatarUpload() { document.getElementById('avatar-input').click(); }
        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                document.getElementById('profile-avatar').src = reader.result;
                localStorage.setItem('user_avatar', reader.result);
            };
        }

        function deleteItem(id, store) {
            db.transaction(store, 'readwrite').objectStore(store).delete(id).onsuccess = () => refreshData();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('active');
        }

        function toggleTheme() { document.body.classList.toggle('dark'); }
        function initTheme() { if(localStorage.getItem('theme') === 'light') document.body.classList.remove('dark'); }
        function triggerUpload() { document.getElementById('upload-input').click(); }

        function resetOutfitsOnly() {
            if(confirm('Удалить сохраненные образы?')) {
                const tx = db.transaction('outfits', 'readwrite');
                tx.objectStore('outfits').clear();
                tx.oncomplete = () => refreshData();
            }
        }
    </script>
</body>
</html>
</html>
