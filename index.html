<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Wardrobe</title>
    
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050231.png">

    <!-- Styles & Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #ffffff; --text: #000000; --card: #f4f4f4; --accent: #000000;
        }
        .dark {
            --bg: #000000; --text: #ffffff; --card: #111111; --accent: #ffffff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(120, 120, 120, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 120, 120, 0.1);
        }

        header {
            padding-top: 3.5rem !important;
            padding-bottom: 0.75rem !important;
        }

        main {
            padding-top: 0.5rem !important;
        }

        .page { display: none; animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: var(--accent); transform: scale(1.1); }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom); }

        .canvas-container { margin: 0 auto !important; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input::placeholder, textarea::placeholder { color: #666; }
    </style>
</head>
<body class="dark">

    <div id="main-interface">
        
        <!-- HEADER -->
        <header class="fixed top-0 left-0 right-0 z-40 px-6 glass">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tighter">WARDROBE AI</h1>
                <div class="flex gap-4">
                    <button onclick="toggleTheme()"><i data-lucide="sun-moon" class="w-5 h-5"></i></button>
                    <button onclick="showPage('profile')"><i data-lucide="user" class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <main class="pt-16 pb-32 px-6 max-w-2xl mx-auto mt-12">
            
            <!-- HOME PAGE -->
            <section id="view-home" class="page active">
                <div class="glass rounded-[35px] p-6 mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p id="weather-city" class="text-[10px] uppercase tracking-widest text-gray-500">Загрузка...</p>
                            <h2 id="weather-temp" class="text-5xl font-light tracking-tighter">--°</h2>
                        </div>
                        <div class="text-right">
                            <p id="weather-desc" class="text-sm font-medium">--</p>
                            <p class="text-[10px] text-gray-500">Влажность: <span id="weather-hum">--</span>%</p>
                        </div>
                    </div>
                    <div id="weather-forecast" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
                </div>

                <div class="glass rounded-[35px] p-6 mb-8">
                    <h3 class="text-sm font-bold flex items-center gap-2 mb-4">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> AI СОВЕТ ДНЯ
                    </h3>
                    <p id="ai-daily-advice" class="text-lg font-light leading-snug">Загрузите вещи, чтобы AI мог дать вам совет по стилю.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="triggerUpload()" class="h-40 glass rounded-[30px] flex flex-col items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-8 h-8"></i>
                        <span class="text-xs font-semibold">Загрузить</span>
                    </button>
                    <button onclick="showPage('closet')" class="h-40 glass rounded-[30px] flex flex-col items-center justify-center gap-2">
                        <i data-lucide="shirt" class="w-8 h-8"></i>
                        <span class="text-xs font-semibold">Моя одежда</span>
                    </button>
                </div>
            </section>

            <!-- CLOSET PAGE -->
            <section id="view-closet" class="page">
                <h2 class="text-3xl font-bold mb-6">Гардероб</h2>
                <div id="closet-grid" class="grid grid-cols-2 gap-4"></div>
            </section>

            <!-- EDITOR PAGE -->
            <section id="view-editor" class="page">
                <h2 class="text-xl font-bold mb-6">Конструктор</h2>
                <div class="flex justify-center mb-8">
                    <canvas id="outfit-canvas"></canvas>
                </div>
                <div id="editor-inventory" class="flex gap-4 overflow-x-auto no-scrollbar glass p-4 rounded-[30px]"></div>
                <button onclick="saveOutfit()" class="w-full mt-4 bg-white text-black py-4 rounded-2xl font-bold">Сохранить образ</button>
            </section>

            <!-- PROFILE PAGE -->
            <section id="view-profile" class="page">
                <div class="flex flex-col items-center mb-10">
                    <!-- Avatar Upload -->
                    <div class="relative group cursor-pointer" onclick="document.getElementById('avatar-input').click()">
                        <div id="avatar-preview" class="w-32 h-32 bg-gray-800 rounded-full flex items-center justify-center overflow-hidden border-2 border-white/10">
                            <i data-lucide="camera" id="camera-icon" class="w-8 h-8 text-gray-500"></i>
                        </div>
                        <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                            <span class="text-[10px] font-bold uppercase tracking-tighter text-white">Изменить</span>
                        </div>
                    </div>
                    <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                    
                    <div class="w-full mt-8 space-y-4">
                        <div class="glass p-5 rounded-[25px]">
                            <label class="text-[10px] uppercase text-gray-500 font-bold mb-2 block">Имя</label>
                            <input type="text" id="user-name" placeholder="Ваше имя..." class="w-full bg-transparent border-none outline-none text-xl font-bold" oninput="saveUserData()">
                        </div>

                        <div class="glass p-5 rounded-[25px]">
                            <label class="text-[10px] uppercase text-gray-500 font-bold mb-2 block">Обо мне / Стиль</label>
                            <textarea id="user-bio" placeholder="Предпочтения, рост, стиль..." class="w-full bg-transparent border-none outline-none text-base font-light h-24 resize-none" oninput="saveUserData()"></textarea>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="glass p-6 rounded-[30px] text-center">
                        <span id="stat-items" class="text-2xl font-bold">0</span>
                        <p class="text-[10px] uppercase text-gray-500 mt-1">Вещей</p>
                    </div>
                    <div class="glass p-6 rounded-[30px] text-center">
                        <span id="stat-looks" class="text-2xl font-bold">0</span>
                        <p class="text-[10px] uppercase text-gray-500 mt-1">Образов</p>
                    </div>
                </div>

                <button onclick="resetApp()" class="w-full py-4 text-red-500 text-sm font-bold border border-red-500/20 rounded-2xl">Сбросить все данные</button>
            </section>

        </main>

        <!-- NAVIGATION -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-20 glass rounded-[40px] flex items-center justify-around px-8 z-50 tab-bar">
            <button onclick="showPage('home')" class="nav-btn text-gray-400" id="btn-home"><i data-lucide="home"></i></button>
            <button onclick="showPage('closet')" class="nav-btn text-gray-400" id="btn-closet"><i data-lucide="shirt"></i></button>
            <button onclick="showPage('editor')" class="nav-btn text-gray-400" id="btn-editor"><i data-lucide="combine"></i></button>
            <button onclick="showPage('profile')" class="nav-btn text-gray-400" id="btn-profile"><i data-lucide="user"></i></button>
        </nav>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">

    <script>
        const WEATHER_KEY = 'd73f839eb883d8a9f75cf9433fb4713e';
        let db, canvas;

        // --- ИНИЦИАЛИЗАЦИЯ ---
        window.onload = async () => {
            initDB();
            lucide.createIcons();
            initTheme();
            initCanvas();
            initWeather();
            loadUserData();
            showPage('home');
        };

        function initDB() {
            const request = indexedDB.open('WardrobeDB', 1);
            request.onupgradeneeded = (e) => {
                e.target.result.createObjectStore('items', { keyPath: 'id' });
                e.target.result.createObjectStore('outfits', { keyPath: 'id' });
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                renderCloset();
                updateStats();
            };
        }

        // --- ПРОФИЛЬ И ДАННЫЕ ---
        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result;
                localStorage.setItem('user_avatar', base64);
                displayAvatar(base64);
            };
            reader.readAsDataURL(file);
        }

        function displayAvatar(base64) {
            const preview = document.getElementById('avatar-preview');
            const icon = document.getElementById('camera-icon');
            if (base64) {
                preview.innerHTML = `<img src="${base64}" class="w-full h-full object-cover">`;
            }
        }

        function saveUserData() {
            const data = {
                name: document.getElementById('user-name').value,
                bio: document.getElementById('user-bio').value
            };
            localStorage.setItem('user_data', JSON.stringify(data));
        }

        function loadUserData() {
            const savedData = JSON.parse(localStorage.getItem('user_data') || '{}');
            document.getElementById('user-name').value = savedData.name || '';
            document.getElementById('user-bio').value = savedData.bio || '';
            displayAvatar(localStorage.getItem('user_avatar'));
        }

        // --- НАВИГАЦИЯ И ИНТЕРФЕЙС ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${pageId}`).classList.add('active');
            document.getElementById(`btn-${pageId}`).classList.add('active');
            if (pageId === 'profile') updateStats();
        }

        function toggleTheme() {
            const theme = document.body.classList.contains('dark') ? 'light' : 'dark';
            document.body.className = theme;
            localStorage.setItem('theme', theme);
        }

        function initTheme() {
            document.body.className = localStorage.getItem('theme') || 'dark';
        }

        // --- ФУНКЦИОНАЛ ---
        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            Swal.fire({ title: 'Обработка...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const blob = await imglyRemoveBackground(file);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const item = { id: Date.now(), img: reader.result, category: 'all' };
                    const tx = db.transaction('items', 'readwrite');
                    tx.objectStore('items').add(item);
                    tx.oncomplete = () => { renderCloset(); Swal.close(); };
                };
            } catch (err) { Swal.fire('Ошибка', 'Не удалось удалить фон', 'error'); }
        }

        function renderCloset() {
            const tx = db.transaction('items', 'readonly');
            tx.objectStore('items').getAll().onsuccess = (e) => {
                const items = e.target.result;
                document.getElementById('closet-grid').innerHTML = items.map(i => `
                    <div class="glass p-4 rounded-[30px] relative">
                        <img src="${i.img}" class="w-full aspect-square object-contain">
                        <button onclick="deleteItem(${i.id})" class="absolute top-2 right-2 text-red-500"><i data-lucide="x-circle"></i></button>
                    </div>
                `).join('');
                document.getElementById('editor-inventory').innerHTML = items.map(i => `
                    <img src="${i.img}" onclick="addToCanvas('${i.img}')" class="w-16 h-16 glass p-2 rounded-xl flex-shrink-0 cursor-pointer">
                `).join('');
                lucide.createIcons();
            };
        }

        function deleteItem(id) {
            db.transaction('items', 'readwrite').objectStore('items').delete(id).onsuccess = renderCloset;
        }

        function initCanvas() {
            const size = Math.min(window.innerWidth - 60, 400);
            canvas = new fabric.Canvas('outfit-canvas', { width: size, height: size * 1.2 });
        }

        function addToCanvas(url) {
            fabric.Image.fromURL(url, (img) => {
                img.scaleToWidth(150);
                canvas.add(img);
            });
        }

        function saveOutfit() {
            const data = canvas.toDataURL();
            db.transaction('outfits', 'readwrite').objectStore('outfits').add({ id: Date.now(), img: data });
            Swal.fire('Успех', 'Образ сохранен в профиль', 'success');
        }

        function updateStats() {
            db.transaction('items').objectStore('items').count().onsuccess = (e) => document.getElementById('stat-items').innerText = e.target.result;
            db.transaction('outfits').objectStore('outfits').count().onsuccess = (e) => document.getElementById('stat-looks').innerText = e.target.result;
        }

        function initWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&units=metric&lang=ru&appid=${WEATHER_KEY}`);
                const data = await res.json();
                document.getElementById('weather-city').innerText = data.name;
                document.getElementById('weather-temp').innerText = Math.round(data.main.temp) + '°';
                document.getElementById('weather-desc').innerText = data.weather[0].description;
            });
        }

        function resetApp() {
            if(confirm('Удалить всё?')) {
                localStorage.clear();
                indexedDB.deleteDatabase('WardrobeDB');
                location.reload();
            }
        }
        
        function triggerUpload() { document.getElementById('upload-input').click(); }
    </script>
</body>
</html>
