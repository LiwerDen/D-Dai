<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Wardrobe</title>
    
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050231.png">

    <!-- Styles & Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Подгружаем нейросеть для фона -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #ffffff; --text: #000000; --card: #f4f4f4; --accent: #000000;
        }
        .dark {
            --bg: #000000; --text: #ffffff; --card: #111111; --accent: #ffffff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(120, 120, 120, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 120, 120, 0.1);
        }

        header {
            padding-top: env(safe-area-inset-top, 1.2rem) !important;
            height: 6rem; 
            display: flex;
            align-items: center;
        }

        main {
            padding-top: 7.5rem !important; 
        }

        .page { display: none; animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: var(--accent); transform: scale(1.1); }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }

        .canvas-container { margin: 0 auto !important; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input::placeholder, textarea::placeholder { color: #666; }
    </style>
</head>
<body class="dark">

    <div id="main-interface">
        
        <!-- HEADER -->
        <header class="fixed top-0 left-0 right-0 z-40 px-8 glass">
            <div class="max-w-2xl mx-auto w-full flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tighter">WARDROBE AI</h1>
                <div class="flex gap-5">
                    <button onclick="toggleTheme()"><i data-lucide="sun-moon" class="w-6 h-6"></i></button>
                    <button onclick="showPage('profile')"><i data-lucide="user" class="w-6 h-6"></i></button>
                </div>
            </div>
        </header>

        <main class="pb-32 px-8 max-w-2xl mx-auto">
            
            <!-- HOME PAGE -->
            <section id="view-home" class="page active">
                <div class="glass rounded-[40px] p-8 mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p id="weather-city" class="text-[11px] uppercase tracking-[0.2em] text-gray-500">Загрузка...</p>
                            <h2 id="weather-temp" class="text-6xl font-light tracking-tighter mt-1">--°</h2>
                        </div>
                        <div class="text-right">
                            <p id="weather-desc" class="text-base font-medium">--</p>
                            <p class="text-[11px] text-gray-500 mt-1">Влажность: <span id="weather-hum">--</span>%</p>
                        </div>
                    </div>
                    <div id="weather-forecast" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div>
                </div>

                <div class="glass rounded-[40px] p-8 mb-8">
                    <h3 class="text-xs font-bold flex items-center gap-2 mb-4 tracking-widest uppercase">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> AI СОВЕТ ДНЯ
                    </h3>
                    <p id="ai-daily-advice" class="text-xl font-light leading-relaxed">Добавьте одежду в гардероб, чтобы получить персональные рекомендации.</p>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <button onclick="triggerUpload()" class="h-44 glass rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition">
                        <i data-lucide="plus-circle" class="w-9 h-9"></i>
                        <span class="text-xs font-bold uppercase tracking-wider">Загрузить</span>
                    </button>
                    <button onclick="showPage('closet')" class="h-44 glass rounded-[35px] flex flex-col items-center justify-center gap-3 active:scale-95 transition">
                        <i data-lucide="shirt" class="w-9 h-9"></i>
                        <span class="text-xs font-bold uppercase tracking-wider">Гардероб</span>
                    </button>
                </div>
            </section>

            <!-- CLOSET PAGE -->
            <section id="view-closet" class="page">
                <h2 class="text-4xl font-bold mb-8 tracking-tight">Гардероб</h2>
                <div id="closet-grid" class="grid grid-cols-2 gap-5"></div>
            </section>

            <!-- EDITOR PAGE -->
            <section id="view-editor" class="page">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold tracking-tight">Конструктор</h2>
                    <button onclick="aiGenerateOutfit()" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase flex items-center gap-2 active:scale-90 transition">
                        <i data-lucide="wand-2" class="w-3 h-3"></i> AI Генерaция
                    </button>
                </div>
                <div class="flex justify-center mb-8">
                    <canvas id="outfit-canvas"></canvas>
                </div>
                <div id="editor-inventory" class="flex gap-5 overflow-x-auto no-scrollbar glass p-6 rounded-[35px]"></div>
                <button onclick="saveOutfit()" class="w-full mt-6 bg-white text-black py-5 rounded-[25px] font-bold text-sm uppercase tracking-widest active:scale-95 transition">Сохранить образ</button>
            </section>

            <!-- PROFILE PAGE -->
            <section id="view-profile" class="page">
                <div class="flex flex-col items-center mb-10">
                    <div class="relative group cursor-pointer" onclick="document.getElementById('avatar-input').click()">
                        <div id="avatar-preview" class="w-32 h-32 bg-gray-800 rounded-full flex items-center justify-center overflow-hidden border-2 border-white/10 shadow-2xl">
                            <i data-lucide="camera" id="camera-icon" class="w-10 h-10 text-gray-500"></i>
                        </div>
                        <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                            <i data-lucide="edit-3" class="w-6 h-6 text-white"></i>
                        </div>
                    </div>
                    <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                    
                    <div class="w-full mt-10 space-y-4">
                        <div class="glass p-6 rounded-[30px]">
                            <label class="text-[11px] uppercase text-gray-500 font-bold mb-2 block tracking-widest">Имя пользователя</label>
                            <input type="text" id="user-name" placeholder="Введите имя..." class="w-full bg-transparent border-none outline-none text-2xl font-bold" oninput="saveUserData()">
                        </div>

                        <div class="glass p-6 rounded-[30px]">
                            <label class="text-[11px] uppercase text-gray-500 font-bold mb-2 block tracking-widest">Ваш стиль / Био</label>
                            <textarea id="user-bio" placeholder="Расскажите о своих предпочтениях..." class="w-full bg-transparent border-none outline-none text-base font-light h-28 resize-none leading-relaxed" oninput="saveUserData()"></textarea>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5 mb-10">
                    <div class="glass p-7 rounded-[30px] text-center">
                        <span id="stat-items" class="text-3xl font-bold">0</span>
                        <p class="text-[11px] uppercase text-gray-500 font-bold mt-2 tracking-widest">Вещей</p>
                    </div>
                    <div class="glass p-7 rounded-[30px] text-center">
                        <span id="stat-looks" class="text-3xl font-bold">0</span>
                        <p class="text-[11px] uppercase text-gray-500 font-bold mt-2 tracking-widest">Образов</p>
                    </div>
                </div>

                <button onclick="resetApp()" class="w-full py-5 text-red-500 text-[11px] font-black uppercase tracking-[0.2em] border border-red-500/10 rounded-2xl active:bg-red-500/5 transition">Полный сброс системы</button>
            </section>

        </main>

        <!-- NAVIGATION -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-20 glass rounded-[40px] flex items-center justify-around px-8 z-50 tab-bar">
            <button onclick="showPage('home')" class="nav-btn text-gray-400" id="btn-home"><i data-lucide="home" class="w-6 h-6"></i></button>
            <button onclick="showPage('closet')" class="nav-btn text-gray-400" id="btn-closet"><i data-lucide="shirt" class="w-6 h-6"></i></button>
            <button onclick="showPage('editor')" class="nav-btn text-gray-400" id="btn-editor"><i data-lucide="combine" class="w-6 h-6"></i></button>
            <button onclick="showPage('profile')" class="nav-btn text-gray-400" id="btn-profile"><i data-lucide="user" class="w-6 h-6"></i></button>
        </nav>
    </div>

    <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">

    <script>
        const WEATHER_KEY = 'd73f839eb883d8a9f75cf9433fb4713e';
        let db, canvas;

        window.onload = async () => {
            initDB();
            initCanvas();
            initWeather();
            loadUserData();
            initTheme();
            showPage('home');
            lucide.createIcons();
        };

        function initDB() {
            const request = indexedDB.open('WardrobeDB', 1);
            request.onupgradeneeded = (e) => {
                const dbInstance = e.target.result;
                if (!dbInstance.objectStoreNames.contains('items')) dbInstance.createObjectStore('items', { keyPath: 'id' });
                if (!dbInstance.objectStoreNames.contains('outfits')) dbInstance.createObjectStore('outfits', { keyPath: 'id' });
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                renderCloset();
                updateStats();
            };
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            Swal.fire({ 
                title: 'Обработка...', 
                text: 'Удаляем фон (может занять время)',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            try {
                // Тайм-аут для нейросети (если не ответит за 3 сек, берем оригинал)
                const removeBgPromise = imglyRemoveBackground(file);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject('timeout'), 4000));
                
                let blob;
                try {
                    blob = await Promise.race([removeBgPromise, timeoutPromise]);
                } catch (err) {
                    console.log("BG removal skipped or failed");
                    blob = file;
                }

                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const item = { id: Date.now(), img: reader.result };
                    const tx = db.transaction('items', 'readwrite');
                    tx.objectStore('items').add(item);
                    tx.oncomplete = () => { 
                        renderCloset(); 
                        updateStats(); 
                        Swal.fire({ icon: 'success', title: 'Добавлено!', showConfirmButton: false, timer: 1000 });
                    };
                };
            } catch (err) {
                Swal.fire('Ошибка', 'Не удалось загрузить фото', 'error');
            }
        }

        function renderCloset() {
            if (!db) return;
            const tx = db.transaction('items', 'readonly');
            tx.objectStore('items').getAll().onsuccess = (e) => {
                const items = e.target.result;
                const grid = document.getElementById('closet-grid');
                const inv = document.getElementById('editor-inventory');
                
                if(grid) {
                    grid.innerHTML = items.map(i => `
                        <div class="glass p-5 rounded-[35px] relative group">
                            <img src="${i.img}" class="w-full aspect-square object-contain">
                            <button onclick="deleteItem(${i.id})" class="absolute top-3 right-3 text-red-500 bg-red-500/10 p-2 rounded-full opacity-0 group-hover:opacity-100 transition">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `).join('');
                }

                if(inv) {
                    inv.innerHTML = items.map(i => `
                        <img src="${i.img}" onclick="addToCanvas('${i.img}')" class="w-20 h-20 glass p-3 rounded-2xl flex-shrink-0 cursor-pointer active:scale-90 transition">
                    `).join('');
                }
                lucide.createIcons();
            };
        }

        function initCanvas() {
            const size = Math.min(window.innerWidth - 80, 450);
            canvas = new fabric.Canvas('outfit-canvas', { 
                width: size, 
                height: size * 1.1,
                backgroundColor: 'transparent'
            });
        }

        function addToCanvas(url) {
            fabric.Image.fromURL(url, (img) => {
                img.scaleToWidth(150);
                img.set({ 
                    cornerStyle: 'circle', 
                    cornerColor: '#fff', 
                    borderColor: '#4f46e5',
                    transparentCorners: false 
                });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            });
        }

        async function aiGenerateOutfit() {
            if (!db) return;
            const tx = db.transaction('items', 'readonly');
            tx.objectStore('items').getAll().onsuccess = (e) => {
                const items = e.target.result;
                if (items.length < 2) {
                    Swal.fire('Мало вещей', 'Добавьте хотя бы 2-3 вещи', 'info');
                    return;
                }
                
                canvas.clear();
                // AI выбирает от 2 до 4 случайных вещей
                const count = Math.min(items.length, Math.floor(Math.random() * 2) + 2);
                const shuffled = items.sort(() => 0.5 - Math.random()).slice(0, count);

                shuffled.forEach((item, index) => {
                    fabric.Image.fromURL(item.img, (img) => {
                        img.scaleToWidth(140);
                        img.set({ 
                            top: 40 + (index * 60), 
                            left: 40 + (index * 30),
                            angle: (Math.random() - 0.5) * 15
                        });
                        canvas.add(img);
                    });
                });
                Swal.fire({ title: 'AI собрал образ!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
            };
        }

        function saveOutfit() {
            if (canvas.getObjects().length === 0) return;
            const data = canvas.toDataURL();
            const tx = db.transaction('outfits', 'readwrite');
            tx.objectStore('outfits').add({ id: Date.now(), img: data });
            tx.oncomplete = () => {
                updateStats();
                Swal.fire({ icon: 'success', title: 'Образ сохранен!', showConfirmButton: false, timer: 1500 });
            };
        }

        // Вспомогательные функции (Профиль, Удаление, Погода)
        function deleteItem(id) {
            db.transaction('items', 'readwrite').objectStore('items').delete(id).onsuccess = renderCloset;
        }

        function updateStats() {
            if(!db) return;
            db.transaction('items').objectStore('items').count().onsuccess = (e) => document.getElementById('stat-items').innerText = e.target.result;
            db.transaction('outfits').objectStore('outfits').count().onsuccess = (e) => document.getElementById('stat-looks').innerText = e.target.result;
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${pageId}`).classList.add('active');
            document.getElementById(`btn-${pageId}`).classList.add('active');
            if(pageId === 'profile') updateStats();
            window.scrollTo(0,0);
        }

        function triggerUpload() { document.getElementById('upload-input').click(); }

        function toggleTheme() {
            const theme = document.body.classList.contains('dark') ? 'light' : 'dark';
            document.body.className = theme;
            localStorage.setItem('theme', theme);
        }

        function initTheme() {
            document.body.className = localStorage.getItem('theme') || 'dark';
        }

        function saveUserData() {
            const data = {
                name: document.getElementById('user-name').value,
                bio: document.getElementById('user-bio').value
            };
            localStorage.setItem('user_data', JSON.stringify(data));
        }

        function loadUserData() {
            const savedData = JSON.parse(localStorage.getItem('user_data') || '{}');
            document.getElementById('user-name').value = savedData.name || '';
            document.getElementById('user-bio').value = savedData.bio || '';
            const avatar = localStorage.getItem('user_avatar');
            if(avatar) document.getElementById('avatar-preview').innerHTML = `<img src="${avatar}" class="w-full h-full object-cover">`;
        }

        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                localStorage.setItem('user_avatar', event.target.result);
                document.getElementById('avatar-preview').innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(file);
        }

        function initWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&units=metric&lang=ru&appid=${WEATHER_KEY}`);
                    const data = await res.json();
                    document.getElementById('weather-city').innerText = data.name;
                    document.getElementById('weather-temp').innerText = Math.round(data.main.temp) + '°';
                    document.getElementById('weather-desc').innerText = data.weather[0].description;
                    document.getElementById('weather-hum').innerText = data.main.humidity;
                } catch(e) {}
            });
        }

        function resetApp() {
            if(confirm('Сбросить систему? Все данные будут удалены.')) {
                indexedDB.deleteDatabase('WardrobeDB');
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
