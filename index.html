<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Wardrobe</title>
    
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3050/3050231.png">

    <!-- Styles & Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #ffffff; --text: #000000; --card: #f4f4f4; --accent: #000000;
        }
        .dark {
            --bg: #000000; --text: #ffffff; --card: #111111; --accent: #ffffff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(120, 120, 120, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 120, 120, 0.1);
        }

        /* КОРРЕКЦИЯ ОТСТУПОВ ШАПКИ */
        header {
            padding-top: 3.5rem !important; /* Отступ под челку/статус-бар */
            padding-bottom: 0.75rem !important;
        }

        /* КОРРЕКЦИЯ ОТСТУПОВ КОНТЕНТА */
        /* КОРРЕКЦИЯ ОТСТУПОВ КОНТЕНТА */

        main {
            padding-top: 0.5rem !important; /* Было 1.5rem, уменьшили до минимума */
        }

        .page { display: none; animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: var(--accent); transform: scale(1.1); }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom); }

        /* Canvas Styles */
        .canvas-container { margin: 0 auto !important; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark">

    <!-- ONBOARDING -->
    <section id="page-onboarding" class="page active min-h-screen flex items-center px-8">
        <div class="max-w-md mx-auto w-full">
            <div id="quiz-step-content">
                <!-- Контент генерируется JS -->
            </div>
        </div>
    </section>

    <!-- MAIN APP WRAPPER (HIDDEN UNTIL ONBOARDING DONE) -->
    <div id="main-interface" class="hidden">
        
        <!-- HEADER -->
        <header class="fixed top-0 left-0 right-0 z-40 px-6 glass">
            <div class="max-w-2xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tighter">WARDROBE AI</h1>
                <div class="flex gap-4">
                    <button onclick="toggleTheme()"><i data-lucide="sun-moon" class="w-5 h-5"></i></button>
                    <button onclick="showPage('profile')"><i data-lucide="user" class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ С УМЕНЬШЕННЫМ PT-16 (вместо pt-32) -->
       <!-- ОСНОВНОЙ КОНТЕНТ -->
        <!-- Изменено: mt-20 заменен на mt-12 (соответствует высоте шапки) -->
        <main class="pt-16 pb-32 px-6 max-w-2xl mx-auto mt-12">
                    
            <!-- HOME PAGE -->
            <section id="view-home" class="page">
                <div class="glass rounded-[35px] p-6 mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p id="weather-city" class="text-[10px] uppercase tracking-widest text-gray-500">Загрузка...</p>
                            <h2 id="weather-temp" class="text-5xl font-light tracking-tighter">--°</h2>
                        </div>
                        <div class="text-right">
                            <p id="weather-desc" class="text-sm font-medium">--</p>
                            <p class="text-[10px] text-gray-500">Влажность: <span id="weather-hum">--</span>%</p>
                        </div>
                    </div>
                    <div id="weather-forecast" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
                </div>

                <div class="glass rounded-[35px] p-6 mb-8">
                    <h3 class="text-sm font-bold flex items-center gap-2 mb-4">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> AI СОВЕТ ДНЯ
                    </h3>
                    <p id="ai-daily-advice" class="text-lg font-light leading-snug">Загрузите вещи, чтобы AI мог дать вам совет по стилю на основе погоды.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="triggerUpload()" class="h-40 glass rounded-[30px] flex flex-col items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-8 h-8"></i>
                        <span class="text-xs font-semibold">Загрузить</span>
                    </button>
                    <button onclick="showPage('closet')" class="h-40 glass rounded-[30px] flex flex-col items-center justify-center gap-2">
                        <i data-lucide="shirt" class="w-8 h-8"></i>
                        <span class="text-xs font-semibold">Моя одежда</span>
                    </button>
                </div>
            </section>

            <!-- CLOSET PAGE -->
            <section id="view-closet" class="page">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold tracking-tight">Гардероб</h2>
                    <div class="flex gap-2">
                        <input type="text" id="closet-search" placeholder="Поиск..." class="glass px-4 py-2 rounded-full text-xs outline-none">
                    </div>
                </div>
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6">
                    <button class="cat-btn active px-5 py-2 glass rounded-full text-[10px] font-bold uppercase" onclick="filterCloset('all')">Все</button>
                    <button class="cat-btn px-5 py-2 glass rounded-full text-[10px] font-bold uppercase" onclick="filterCloset('верх')">Верх</button>
                    <button class="cat-btn px-5 py-2 glass rounded-full text-[10px] font-bold uppercase" onclick="filterCloset('низ')">Низ</button>
                    <button class="cat-btn px-5 py-2 glass rounded-full text-[10px] font-bold uppercase" onclick="filterCloset('обувь')">Обувь</button>
                </div>

                <div id="closet-grid" class="grid grid-cols-2 gap-4"></div>
            </section>

            <!-- EDITOR PAGE -->
            <section id="view-editor" class="page">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Конструктор</h2>
                    <button onclick="saveOutfit()" class="bg-white text-black px-4 py-2 rounded-full text-[10px] font-bold uppercase">Сохранить</button>
                </div>
                <div class="flex justify-center mb-8">
                    <canvas id="outfit-canvas"></canvas>
                </div>
                <div id="editor-inventory" class="flex gap-4 overflow-x-auto no-scrollbar glass p-4 rounded-[30px]"></div>
            </section>

            <!-- AI OUTFIT PAGE -->
            <section id="view-ai" class="page">
                <h2 class="text-3xl font-bold mb-6">AI Стилист</h2>
                <div class="glass rounded-[35px] p-6 mb-6">
                    <textarea id="ai-request" placeholder="Например: хочу образ на холодную погоду в стиле old money..." class="w-full bg-transparent border-none outline-none resize-none text-lg font-light h-32"></textarea>
                    <button onclick="generateAIOutfit()" class="w-full bg-white text-black py-4 rounded-2xl font-bold mt-4 hover:scale-[0.98] transition">Создать образ</button>
                </div>
                <div id="ai-result" class="hidden glass rounded-[35px] p-6 border-white/20 border-2">
                    <!-- AI Result -->
                </div>
            </section>

            <!-- PROFILE PAGE -->
            <section id="view-profile" class="page">
                <div class="text-center mb-10">
                    <div class="w-24 h-24 bg-gray-800 rounded-full mx-auto mb-4 flex items-center justify-center">
                        <i data-lucide="user" class="w-10 h-10"></i>
                    </div>
                    <h2 id="profile-style" class="text-2xl font-bold tracking-tight">--</h2>
                    <p class="text-gray-500 text-sm">Ваш стиль</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="glass p-6 rounded-[30px] text-center">
                        <span id="stat-items" class="text-2xl font-bold">0</span>
                        <p class="text-[10px] uppercase text-gray-500 mt-1">Вещей</p>
                    </div>
                    <div class="glass p-6 rounded-[30px] text-center">
                        <span id="stat-looks" class="text-2xl font-bold">0</span>
                        <p class="text-[10px] uppercase text-gray-500 mt-1">Образов</p>
                    </div>
                </div>
                <button onclick="resetApp()" class="w-full py-4 text-red-500 text-sm font-bold">Сбросить все данные</button>
            </section>

        </main>

        <!-- NAVIGATION -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-20 glass rounded-[40px] flex items-center justify-around px-8 z-50 tab-bar">
            <button onclick="showPage('home')" class="nav-btn text-gray-400" id="btn-home"><i data-lucide="home"></i></button>
            <button onclick="showPage('closet')" class="nav-btn text-gray-400" id="btn-closet"><i data-lucide="shirt"></i></button>
            <button onclick="showPage('editor')" class="nav-btn text-gray-400" id="btn-editor"><i data-lucide="combine"></i></button>
            <button onclick="showPage('ai')" class="nav-btn text-gray-400" id="btn-ai"><i data-lucide="sparkles"></i></button>
        </nav>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">

    <script>
        // --- CONFIG & GLOBAL VARS ---
        const GEMINI_KEY = 'YOUR_API_KEY';
        const WEATHER_KEY = 'd73f839eb883d8a9f75cf9433fb4713e';
        let db, canvas, userSettings = {};

        // --- CORE INITIALIZATION ---
        window.onload = async () => {
            initDB();
            lucide.createIcons();
            loadSettings();
            initTheme();
            
            if (localStorage.getItem('onboarding_done')) {
                startApp();
            } else {
                renderOnboarding();
            }
        };

        function initDB() {
            const request = indexedDB.open('WardrobeDB', 1);
            request.onupgradeneeded = (e) => {
                e.target.result.createObjectStore('items', { keyPath: 'id' });
                e.target.result.createObjectStore('outfits', { keyPath: 'id' });
            };
            request.onsuccess = (e) => db = e.target.result;
        }

        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.className = theme;
        }

        function toggleTheme() {
            const isDark = document.body.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            document.body.className = newTheme;
            localStorage.setItem('theme', newTheme);
        }

        function loadSettings() {
            userSettings = JSON.parse(localStorage.getItem('user_settings')) || {};
        }

        let currentStep = 0;
        const quiz = [
            { q: "Ваш пол?", id: 'gender', opts: ['Мужской', 'Женский', 'Другое'] },
            { q: "Ваш стиль?", id: 'style', opts: ['Casual', 'Streetwear', 'Old Money', 'Sport', 'Minimalism'] },
            { q: "Как вы обычно одеваетесь?", id: 'context', opts: ['На учёбу', 'На работу', 'Повседневно', 'Модно'] }
        ];

        function renderOnboarding() {
            const step = quiz[currentStep];
            const content = document.getElementById('quiz-step-content');
            content.innerHTML = `
                <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4">Шаг ${currentStep + 1} из 3</p>
                <h2 class="text-4xl font-bold tracking-tighter mb-10 leading-tight">${step.q}</h2>
                <div class="grid gap-4">
                    ${step.opts.map(opt => `
                        <button onclick="saveQuizStep('${step.id}', '${opt}')" class="w-full py-6 glass rounded-3xl text-left px-8 font-semibold hover:bg-white hover:text-black transition-all">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <button onclick="startApp()" class="w-full mt-10 text-gray-500 text-sm font-medium">Пропустить</button>
            `;
        }

        function saveQuizStep(id, val) {
            userSettings[id] = val;
            currentStep++;
            if (currentStep < quiz.length) renderOnboarding();
            else startApp();
        }

        function startApp() {
            localStorage.setItem('onboarding_done', 'true');
            localStorage.setItem('user_settings', JSON.stringify(userSettings));
            document.getElementById('page-onboarding').classList.remove('active');
            document.getElementById('main-interface').classList.remove('hidden');
            
            showPage('home');
            initWeather();
            initCanvas();
            renderCloset();
            updateStats();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(`view-${pageId}`);
            if (target) target.classList.add('active');
            
            const btn = document.getElementById(`btn-${pageId}`);
            if (btn) btn.classList.add('active');
            
            if (pageId === 'profile') {
                document.getElementById('profile-style').innerText = userSettings.style || 'Не определен';
                updateStats();
            }
        }

        function initWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${WEATHER_KEY}`);
                const data = await res.json();
                
                document.getElementById('weather-city').innerText = data.city.name;
                document.getElementById('weather-temp').innerText = Math.round(data.list[0].main.temp) + '°';
                document.getElementById('weather-desc').innerText = data.list[0].weather[0].description;
                document.getElementById('weather-hum').innerText = data.list[0].main.humidity;

                const forecast = document.getElementById('weather-forecast');
                forecast.innerHTML = data.list.slice(0, 6).map(item => `
                    <div class="glass min-w-[80px] p-4 rounded-2xl text-center">
                        <p class="text-[10px] text-gray-500 mb-1">${item.dt_txt.split(' ')[1].slice(0,5)}</p>
                        <p class="font-bold">${Math.round(item.main.temp)}°</p>
                    </div>
                `).join('');

                generateDailyAdvice(data.list[0]);
            });
        }

        function triggerUpload() { document.getElementById('upload-input').click(); }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            Swal.fire({ title: 'AI Обработка...', text: 'Удаляем фон и анализируем вещь', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const blob = await imglyRemoveBackground(file);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64 = reader.result;
                    
                    const { value: category } = await Swal.fire({
                        title: 'Категория',
                        input: 'select',
                        inputOptions: { 'верх': 'Верх', 'низ': 'Низ', 'обувь': 'Обувь', 'куртки': 'Куртки', 'аксессуары': 'Аксессуары' },
                        background: '#111', color: '#fff'
                    });

                    const item = { id: Date.now(), img: base64, category, date: new Date().toISOString() };
                    const tx = db.transaction('items', 'readwrite');
                    tx.objectStore('items').add(item);
                    tx.oncomplete = () => {
                        renderCloset();
                        Swal.fire({ icon: 'success', title: 'Добавлено!' });
                    };
                };
            } catch (err) {
                console.error(err);
                Swal.fire('Ошибка AI', 'Не удалось обработать фото', 'error');
            }
        }

        async function renderCloset(filter = 'all') {
            const tx = db.transaction('items', 'readonly');
            const items = await new Promise(r => {
                const req = tx.objectStore('items').getAll();
                req.onsuccess = () => r(req.result);
            });

            const grid = document.getElementById('closet-grid');
            const editorInv = document.getElementById('editor-inventory');
            
            const filtered = filter === 'all' ? items : items.filter(i => i.category === filter);
            
            grid.innerHTML = filtered.map(i => `
                <div class="glass p-4 rounded-[30px] relative group">
                    <img src="${i.img}" class="w-full aspect-square object-contain">
                    <button onclick="deleteItem(${i.id})" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-2 bg-red-500/20 rounded-full text-red-500 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');

            editorInv.innerHTML = items.map(i => `
                <img src="${i.img}" onclick="addToCanvas('${i.img}')" class="w-16 h-16 object-contain glass p-2 rounded-xl flex-shrink-0 cursor-pointer">
            `).join('');

            lucide.createIcons();
        }

        function deleteItem(id) {
            const tx = db.transaction('items', 'readwrite');
            tx.objectStore('items').delete(id);
            tx.oncomplete = () => renderCloset();
        }

        function initCanvas() {
            const size = Math.min(window.innerWidth - 60, 400);
            canvas = new fabric.Canvas('outfit-canvas', {
                width: size,
                height: size * 1.2,
                backgroundColor: 'transparent'
            });
        }

        function addToCanvas(url) {
            fabric.Image.fromURL(url, (img) => {
                img.scaleToWidth(150);
                img.set({ cornerStyle: 'circle', cornerColor: 'white', borderColor: 'white' });
                canvas.add(img);
                canvas.setActiveObject(img);
            });
        }

        function saveOutfit() {
            const dataURL = canvas.toDataURL();
            const tx = db.transaction('outfits', 'readwrite');
            tx.objectStore('outfits').add({ id: Date.now(), img: dataURL });
            Swal.fire('Сохранено!', 'Образ добавлен в профиль', 'success');
        }

        async function generateAIOutfit() {
            const request = document.getElementById('ai-request').value;
            const resBox = document.getElementById('ai-result');
            resBox.classList.remove('hidden');
            resBox.innerHTML = '<p class="animate-pulse">Стилист думает...</p>';

            setTimeout(() => {
                resBox.innerHTML = `
                    <h4 class="font-bold mb-2">Совет AI Стилиста:</h4>
                    <p class="text-sm font-light leading-relaxed">Учитывая ваш стиль <b>${userSettings.style}</b> и погоду, я рекомендую сочетать светлый верх с темным низом. Это создаст нужный контраст для "${request || 'вашего запроса'}".</p>
                `;
            }, 2000);
        }

        async function generateDailyAdvice(weather) {
            const adviceEl = document.getElementById('ai-daily-advice');
            const temp = weather.main.temp;
            if (temp < 10) adviceEl.innerText = "Сегодня холодно. Рекомендую многослойность: куртка поверх свитера будет отличным решением.";
            else if (temp > 20) adviceEl.innerText = "Отличная погода для легких тканей и вашего стиля " + userSettings.style;
            else adviceEl.innerText = "Умеренная температура. Попробуйте сочетать худи с вашим любимым аксессуаром.";
        }

        function updateStats() {
            const txItems = db.transaction('items', 'readonly');
            txItems.objectStore('items').count().onsuccess = (e) => document.getElementById('stat-items').innerText = e.target.result;
            const txLooks = db.transaction('outfits', 'readonly');
            txLooks.objectStore('outfits').count().onsuccess = (e) => document.getElementById('stat-looks').innerText = e.target.result;
        }

        function resetApp() {
            localStorage.clear();
            indexedDB.deleteDatabase('WardrobeDB');
            location.reload();
        }
    </script>
</body>
</html>
